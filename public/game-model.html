<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celestial Tarot — Saturn Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #0a0015;
      --bg-space: #0d0921;
      --accent-gold: #f9ca24;
      --accent-neon: #e056fd;
      --accent-cyan: #00cec9;
      --silver: #c8d4e8;
      --dialogue-bg: #0a0818;
      --border: #7880a0;
    }

    body {
      background: var(--bg-deep);
      color: var(--silver);
      font-family: 'Press Start 2P', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .game-container {
      width: 333px;
      height: 600px;
      position: relative;
      background: var(--bg-deep);
      border: 4px solid #e056fd;
      box-shadow: inset 0 0 60px rgba(0,0,0,0.8), 0 0 40px rgba(233,86,253,0.4);
      overflow: hidden;
      box-sizing: border-box;
      max-width: 100vw;
      max-height: 100vh;
    }

    /* CRT scanlines overlay */
    .game-container::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      background: repeating-linear-gradient(
        transparent 0px, transparent 2px,
        rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px
      );
    }

    /* Scene zone: 50% of container (300px) */
    .scene-zone {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 300px;
      background: var(--bg-space);
      overflow: hidden;
      position: relative;
    }

    /* Vignette effect (darker edges) */
    .scene-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.4) 100%);
      pointer-events: none;
      z-index: 2;
    }

    #starfield {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    .character-container {
      position: absolute;
      top: 10%; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      transition: opacity 0.5s ease;
    }
    .character-container.hidden { opacity: 0; pointer-events: none; }

    #character-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      max-width: 160px;
      max-height: 240px;
    }

    /* Card image zone */
    .card-image-zone {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 270px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 5;
    }
    .card-image-zone.visible { opacity: 1; }

    .card-image {
      max-width: 160px;
      max-height: 235px;
      object-fit: contain;
      image-rendering: auto;
      border: 3px solid var(--accent-gold);
    }

    /* SNES-style Minor Arcana fallback card */
    .card-fallback {
      width: 110px;
      height: 160px;
      background: linear-gradient(160deg, #1a0640 0%, #0d0921 55%, #120435 100%);
      border: 3px solid var(--accent-gold);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 10px 6px;
      position: relative;
      overflow: hidden;
    }
    .card-fallback::before {
      content: '';
      position: absolute;
      inset: 5px;
      border: 1px solid rgba(249,202,36,0.25);
      pointer-events: none;
    }
    .card-fallback-suit { font-size: 22px; line-height: 1; }
    .card-fallback-rank {
      font-size: 7px;
      color: var(--accent-gold);
      text-align: center;
      line-height: 1.7;
      word-wrap: break-word;
    }
    .card-fallback-suit-bottom { font-size: 14px; line-height: 1; transform: rotate(180deg); opacity: 0.5; }

    .card-metadata {
      position: absolute;
      bottom: 14px;
      left: 0; right: 0;
      text-align: center;
      z-index: 6;
    }
    .card-name { font-size: 9px; color: var(--accent-gold); margin-bottom: 4px; }
    .card-keywords { font-size: 6px; color: var(--accent-cyan); opacity: 0.8; }

    /* Decorative card grid (scene zone, non-interactive) */
    .card-grid {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 16px 12px;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 3;
    }
    .card-grid.visible { opacity: 1; }

    .card-grid-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      align-items: center;
    }

    .card-back {
      background: linear-gradient(135deg, #1e0a50 0%, #0d0921 50%, #1e0a50 100%);
      border: 2px solid var(--accent-neon);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      transition: transform 0.2s ease;
    }

    /* Animated stars on card back */
    .card-back::before {
      content: '✦';
      font-size: 14px;
      color: var(--accent-neon);
      opacity: 0.6;
      animation: starTwinkle 2s infinite;
      z-index: 2;
    }

    /* Card back shimmer effect */
    .card-back::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(224,208,255,0.2), transparent);
      animation: shimmer 3s infinite;
    }

    @keyframes starTwinkle {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .card-back.revealed {
      border-color: rgba(249,202,36,0.4);
      opacity: 0.35;
    }
    .card-back.revealed::before {
      content: '★';
      color: var(--accent-gold);
      opacity: 0.6;
    }

    /* Orrery */
    .orrery-zone {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 370px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 8;
    }
    .orrery-zone.visible { opacity: 1; pointer-events: auto; }
    #orrery-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      image-rendering: pixelated;
      cursor: pointer;
    }

    /* Nav bar */
    .nav-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 28px;
      background: rgba(0,0,0,0.5);
      border-bottom: 2px solid var(--accent-gold);
      display: flex;
      align-items: center;
      padding: 0 8px;
      z-index: 25;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .nav-bar.visible { opacity: 1; pointer-events: auto; }
    .back-btn {
      background: transparent;
      border: 1px solid var(--accent-gold);
      color: var(--accent-gold);
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      padding: 2px 6px;
      cursor: pointer;
    }
    .back-btn:hover { background: var(--accent-gold); color: var(--bg-deep); }

    /* ═══════════════════════════════════
       SNES RPG DIALOGUE PANEL (50% of container)
    ═══════════════════════════════════ */
    .dialogue-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 300px;
      max-height: 300px;
      background: #09071a;
      background-image:
        radial-gradient(circle 1px at 2px 2px, rgba(140,140,255,0.06) 100%, transparent 0);
      background-size: 4px 4px;
      border-top: 4px solid #7880a0;
      box-shadow:
        inset 4px 4px 0 rgba(255,255,255,0.10),
        inset -4px 4px 0 rgba(255,255,255,0.10),
        inset 8px 8px 0 rgba(0,0,0,0.25),
        inset -8px 8px 0 rgba(0,0,0,0.25);
      padding: 10px 14px 8px;
      display: flex;
      flex-direction: column;
      z-index: 20;
      overflow: hidden;
    }

    .dialogue-text {
      height: 140px;
      overflow-y: auto;
      overflow-x: hidden;
      font-size: 9px;
      line-height: 1.8;
      color: var(--silver);
      margin-bottom: 6px;
      word-wrap: break-word;
      flex-shrink: 0;
      padding-right: 6px;
      scroll-behavior: smooth;
      position: relative;
    }

    /* SNES-style scroll down indicator */
    .dialogue-text.has-overflow::after {
      content: '▼';
      position: absolute;
      right: 0;
      bottom: 2px;
      font-size: 8px;
      color: var(--accent-gold);
      opacity: 0.8;
      animation: scrollIndicator 1s infinite;
    }

    /* SNES-style scroll up indicator */
    .dialogue-text.has-overflow-top::before {
      content: '▲';
      position: absolute;
      right: 0;
      top: 2px;
      font-size: 8px;
      color: var(--accent-gold);
      opacity: 0.8;
    }

    @keyframes scrollIndicator {
      0%, 100% { transform: translateY(0); opacity: 0.8; }
      50% { transform: translateY(3px); opacity: 0.5; }
    }

    .dialogue-separator {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(120,128,160,0.5), transparent);
      margin-bottom: 4px;
      flex-shrink: 0;
    }

    .dialogue-options {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      overflow: hidden;
      min-height: 0;
      max-height: 100%;
    }

    /* Two-column grid for planet selection (7 buttons) */
    .dialogue-options.two-col {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1px;
      align-content: start;
    }

    /* SNES RPG arrow-selector buttons (ENLARGED) */
    .option-btn {
      position: relative;
      background: transparent;
      border: none;
      color: var(--silver);
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      padding: 4px 6px 4px 14px;
      cursor: pointer;
      text-align: left;
      white-space: normal;
      word-wrap: break-word;
      overflow: visible;
      flex-shrink: 0;
      line-height: 1.2;
      transition: color 0.06s ease;
      max-width: 100%;
      min-height: auto;
    }
    .option-btn::before {
      content: ' ';
      position: absolute;
      left: 4px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent-gold);
      font-size: 6px;
    }
    .option-btn:hover, .option-btn:focus {
      color: var(--accent-gold);
      outline: none;
    }
    .option-btn:hover::before, .option-btn:focus::before { content: '▶'; }
    .option-btn:active { opacity: 0.7; }

    .option-btn.revealed-pos {
      opacity: 0.38;
      cursor: default;
      color: var(--accent-gold);
    }
    .option-btn.revealed-pos::before { content: '✓'; color: var(--accent-gold); }

    /* Boot console */
    .boot-console {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
    }
    .boot-console.hidden { opacity: 0; pointer-events: none; }
    .boot-text {
      font-size: 9px;
      color: var(--accent-gold);
      line-height: 2.2;
      width: 90%; height: 90%;
      overflow: hidden;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    @keyframes palette-flash {
      0%   { filter: brightness(1); }
      50%  { filter: brightness(2.2); }
      100% { filter: brightness(1); }
    }
    .flash { animation: palette-flash 0.3s ease; }

    /* ═══════════════════════════════════ */
    /* SMOOTH TRANSITIONS & ANIMATIONS    */
    /* ═══════════════════════════════════ */

    /* Fade in/out for scene elements */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    /* Dialogue panel fade and slide */
    @keyframes dialogueFadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Card flip reveal animation */
    @keyframes cardFlip {
      0%   { transform: rotateY(0deg); opacity: 0.3; }
      50%  { transform: rotateY(90deg); }
      100% { transform: rotateY(0deg); opacity: 1; }
    }

    /* Character appearance */
    @keyframes characterAppear {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Smooth palette transition */
    .game-container {
      transition: background-color 0.8s ease, --bg-space 0.8s ease, --accent-neon 0.8s ease;
    }

    .scene-zone {
      transition: background-color 0.8s ease;
    }

    /* Dialogue text animation */
    .dialogue-text {
      animation: dialogueFadeIn 0.4s ease;
    }

    /* Card grid animation */
    .card-grid.visible {
      animation: fadeIn 0.3s ease;
    }

    /* Card image reveal with flip */
    .card-image-zone.visible {
      animation: cardFlip 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    /* Character appearance */
    .character-container:not(.hidden) {
      animation: characterAppear 0.4s ease;
    }

    /* Orrery fade in */
    .orrery-zone.visible {
      animation: fadeIn 0.3s ease;
    }

    /* Respect user's motion preferences */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .game-container { transition: none; }
      .scene-zone { transition: none; }
      .dialogue-text { animation: none; }
      .card-grid.visible { animation: none; }
      .card-image-zone.visible { animation: none; }
      .character-container:not(.hidden) { animation: none; }
      .orrery-zone.visible { animation: none; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="game-container">

    <div class="boot-console hidden" id="boot-console">
      <div class="boot-text" id="boot-text"></div>
    </div>

    <div class="scene-zone">
      <canvas id="starfield" width="333" height="300"></canvas>

      <div class="character-container" id="character-container">
        <canvas id="character-canvas" width="160" height="240"></canvas>
      </div>

      <div class="card-image-zone" id="card-image-zone">
        <div id="card-image-container"></div>
        <div class="card-metadata" id="card-metadata">
          <div class="card-name" id="card-name"></div>
          <div class="card-keywords" id="card-keywords"></div>
        </div>
      </div>

      <div class="card-grid" id="card-grid">
        <div class="card-grid-container" id="card-grid-container"></div>
      </div>

      <div class="orrery-zone" id="orrery-zone">
        <canvas id="orrery-canvas" width="333" height="300"></canvas>
      </div>

      <div class="nav-bar" id="nav-bar">
        <button class="back-btn" id="back-btn">← SPREAD</button>
      </div>
    </div>

    <div class="dialogue-panel">
      <div class="dialogue-text" id="dialogue-text"></div>
      <div class="dialogue-separator"></div>
      <div class="dialogue-options" id="dialogue-options"></div>
    </div>

  </div>

      const SUITS = {
        wands:    { name: 'Wands',    element: 'Fire',  keywords: ['creativity','action','passion'],   orreryPlanet: 'mars' },
        cups:     { name: 'Cups',     element: 'Water', keywords: ['emotions','relationships','intuition'], orreryPlanet: 'moon' },

      };
      const NUMBER_MEANINGS = {
        ace:  { upright: 'New opportunity and potential awaits.', reversed: 'Missed chance, blocked energy.' },
        2:    { upright: 'A decision or partnership. Balance two paths.', reversed: 'Indecision, imbalance.' },
        3:    { upright: 'Collaboration and growth. Working together succeeds.', reversed: 'Delays, lack of teamwork.' },

        6:    { upright: 'Harmony and generosity. Give and receive.', reversed: 'Unequal exchange.' },
        7:    { upright: 'Reflection and assessment. Reevaluate your path.', reversed: 'Confusion, dishonesty.' },
        8:    { upright: 'Movement and progress. Stay focused.', reversed: 'Delays, frustration.' },
        9:    { upright: 'Abundance and wish fulfillment achieved.', reversed: 'Disappointment.' },
        10:   { upright: 'Completion and responsibility. Success carries weight.', reversed: 'Burden, inability to delegate.' },
      };
      const COURT_MEANINGS = {
        page:   { upright: 'A messenger or new beginnings. Curiosity and learning.', reversed: 'Immaturity, lack of direction.' },
        knight: { upright: 'Action and pursuit. Charging forward. A quest begins.', reversed: 'Impulsiveness, recklessness.' },
        queen:  { upright: 'Nurturing mastery. Compassion, empathy, inner strength.', reversed: 'Insecurity, emotional manipulation.' },
        king:   { upright: 'Mastery and authority. Leadership and vision.', reversed: 'Domination, tyranny.' },
      };
      const cards = [];
      const ranks = ['ace','2','3','4','5','6','7','8','9','10','page','knight','queen','king'];
      for (const [suitKey, suit] of Object.entries(SUITS)) {
        for (const rank of ranks) {
          const isCourt = ['page','knight','queen','king'].includes(rank);
          const meanings = isCourt ? COURT_MEANINGS[rank] : (rank === 'ace' ? NUMBER_MEANINGS.ace : NUMBER_MEANINGS[rank]);
          const displayName = rank === 'ace'
            ? `Ace of ${suit.name}`
            : `${rank.charAt(0).toUpperCase() + rank.slice(1)} of ${suit.name}`;
          cards.push({
            id: 22 + cards.length,
            name: displayName,
            suit: suitKey,
            rank,
            element: suit.element,
            keywords: suit.keywords,
            upright: meanings.upright,
            reversed: meanings.reversed,
            orreryPlanet: suit.orreryPlanet,
          });
        }
      }
      return cards;
    }

      if (h >= 6 && h < 12) return 'scribe';
      if (h >= 18)          return 'weaver';
      return 'psychic';
    }

    function mulberry32(seed) {
      return function () {
        seed |= 0;
        seed = (seed + 0x6d2b79f5) | 0;
        let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    // ==================== DIALOGUE SYSTEM ====================
    function typeText(text) {
      const el = document.getElementById('dialogue-text');
      el.textContent = text;
      updateScrollIndicators(el);
    }

    function updateScrollIndicators(el) {
      // Check if content overflows
      const hasOverflow = el.scrollHeight > el.clientHeight;
      const isScrolledToTop = el.scrollTop === 0;
      const isScrolledToBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 2;

      el.classList.toggle('has-overflow', hasOverflow && !isScrolledToBottom);
      el.classList.toggle('has-overflow-top', hasOverflow && !isScrolledToTop);
    }

    // Listen for scroll events to update indicators
    document.addEventListener('DOMContentLoaded', () => {
      const dialogueText = document.getElementById('dialogue-text');
      dialogueText?.addEventListener('scroll', (e) => {
        updateScrollIndicators(e.target);
      });
    });

    function showOptions(options) {
      return new Promise((resolve) => {
        const el = document.getElementById('dialogue-options');
        el.innerHTML = '';
        el.className = options.length >= 6 ? 'dialogue-options two-col' : 'dialogue-options';
        options.forEach((opt) => {
          const btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.textContent = opt.label;
          btn.onclick = () => resolve(opt.value);
          el.appendChild(btn);
        });
      });
    }

    function clearOptions() {
      document.getElementById('dialogue-options').innerHTML = '';
    }

    // ==================== INTENT MAPPING ====================
    function mapIntentToPlanet(intent) {
      const map = {
        'love': 'venus',
        'ambition': 'mars',
        'mystery': 'moon',
      };
      return map[intent] || 'moon';
    }

    function mapIntentToScene(intent) {
      const map = {
        'love': 'moonlit-ritual',
        'ambition': 'astrophysical-lab',
        'mystery': 'cosmic-night',
      };
      return map[intent] || 'cosmic-night';
    }

    // ==================== STATE MACHINE ====================
    async function setState(name) {
      gameState.currentState = name;
      const handlers = {
        GREET:          stateGreet,
        INTENT_SELECT:  stateIntentSelect,
        SPREAD_CHOICE:  stateSpreadChoice,
        CARD_DRAW:      stateCardDraw,
        READING:        stateReading,
        CLOSING:        stateClosing,
      };
      if (handlers[name]) await handlers[name]();
    }

    async function stateGreet() {
      gameState.activeGuide = 'psychic'; // Always psychic reader
      drawCharacter(gameState.activeGuide);
      showCharacter();
      ExpressionSystem.setExpression('neutral-welcome', 300);

      const greeting = DialogueSystem.getOpening();
      typeText(greeting.greeting);

      await showOptions([{ label: 'CONTINUE', value: 'continue' }]);
      await setState('INTENT_SELECT');
    }

    async function stateIntentSelect() {
      ExpressionSystem.setExpression('focused', 300);
      typeText('What calls to your heart today?');

      const intentOptions = DialogueSystem.getIntentOptions();
      gameState.intent = await showOptions(intentOptions);
      gameState.planetaryInfluence = mapIntentToPlanet(gameState.intent);

      const sceneVibe = mapIntentToScene(gameState.intent);
      SceneSystem.setScene(sceneVibe, 400);

      const intentDialogue = DialogueSystem.getIntentDialogue(gameState.intent);
      ExpressionSystem.setExpression(intentDialogue.expressions[0], 300);
      typeText(intentDialogue.prompt);

      await new Promise(resolve => setTimeout(resolve, 800));
      await setState('SPREAD_CHOICE');
    }

    async function stateSpreadChoice() {
      ExpressionSystem.setExpression('focused', 300);

      const spreadDialogue = DialogueSystem.getSpreadDialogue('mirror');
      typeText(spreadDialogue.prompt);

      const spreadOptions = DialogueSystem.getSpreadOptions();
      gameState.spreadType = await showOptions(spreadOptions);

      // Draw cards based on spread type
      const sizes = { mirror: 1, three: 3 };
      const deck = new TarotDeck();
      gameState.drawnCards = deck.draw(sizes[gameState.spreadType]);
      gameState.lightOrShadow = {};
      gameState.currentCardIndex = 0;

      await setState('CARD_DRAW');
    }

    async function stateCardDraw() {
      ExpressionSystem.setExpression('focused', 300);

      const drawPrompt = DialogueSystem.getDrawPrompt();
      typeText(drawPrompt);

      // Flip first card
      const card = gameState.drawnCards[0];
      gameState.lightOrShadow[card.id] = 'upright';

      // Wait a moment, then show card flip dialog
      await new Promise(resolve => setTimeout(resolve, 1200));

      ExpressionSystem.setExpression('revelation', 400);
      updateCardDisplay(card);
      showCardImage();

      await new Promise(resolve => setTimeout(resolve, 600));
      clearOptions();

      await setState('READING');
    }

    async function stateReading() {
      const card = gameState.drawnCards[0];

      // Get the reading for this card/intent combination
      const reading = getFortune(card, gameState.intent, gameState.planetaryInfluence);

      if (!reading) {
        // Fallback fortune if not found
        typeText('The card speaks: ' + card.name);
        await new Promise(resolve => setTimeout(resolve, 1500));
        await setState('CLOSING');
        return;
      }

      // Display reading in 3 parts
      ExpressionSystem.setExpression('revelation', 300);
      typeText(reading.cardSpeaks);

      await new Promise(resolve => setTimeout(resolve, 2000));

      ExpressionSystem.setExpression('cosmic-vision', 300);
      typeText(reading.astrophysical);

      await new Promise(resolve => setTimeout(resolve, 2000));

      ExpressionSystem.setExpression('playful-mischief', 300);
      typeText(reading.absurdTruth);

      await new Promise(resolve => setTimeout(resolve, 1500));
      await setState('CLOSING');
    }

    async function stateClosing() {
      ExpressionSystem.setExpression('knowing-smile', 300);
      typeText('Does this resonate with your spirit?');

      const closingOptions = [
        { label: 'YES, THANK YOU', value: 'yes' },
        { label: 'ANOTHER READING', value: 'another' },
        { label: 'RETURN TO SATURN', value: 'return' },
      ];

      const choice = await showOptions(closingOptions);

      if (choice === 'another') {
        hideCardImage();
        await setState('INTENT_SELECT');
      } else {
        // Return to Saturn terminal
        window.parent.postMessage({ action: 'closeGame' }, '*');
      }
    }

    // Helper function to get fortune for a card
    function getFortune(card, intent, planet) {
      // Try to get from the comprehensive fortune database
      if (typeof getSpecificFortune !== 'undefined') {
        const cardNameFormatted = card.name.toLowerCase().replace(/\s+/g, '-');
        const fortune = getSpecificFortune(cardNameFormatted, intent, planet);
        if (fortune) return fortune;
      }

      // Fall back to fortune database fallbacks
      if (typeof getFortuneFallbackAdvanced !== 'undefined') {
        return getFortuneFallbackAdvanced(card, intent, planet);
      }

      // Ultimate fallback
      return {
        cardSpeaks: `The ${card.name} speaks to your current moment.`,
        astrophysical: `The cosmos moves in mysterious ways, and ${planet}'s influence is felt.`,
        absurdTruth: `The universe whispers: you are exactly where you need to be.`,
      };
    }

    // ==================== DECK ENGINE ====================
    class TarotDeck {
      constructor(options = {}) {
        this.rng = mulberry32(options.seed ?? Date.now());
      }
      shuffle() {
        const arr = [...ALL_CARDS];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(this.rng() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }
      draw(count = 1) {
        return this.shuffle().slice(0, count);
      }
    }

    function drawCharacter(guide) {
      const canvas = document.getElementById('character-canvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, 160, 240);
      // Scale up by 2x for larger character
      ctx.scale(2, 2);

      if (guide === 'scribe') {
        // Enhanced golden sun-priest
        const cx = 40, cy = 22, r = 13;

        // Radiant aura
        const auraGrad = ctx.createRadialGradient(cx, cy, r, cx, cy, r + 8);
        auraGrad.addColorStop(0, 'rgba(249,202,36,0.3)');
        auraGrad.addColorStop(1, 'rgba(249,202,36,0)');
        ctx.fillStyle = auraGrad;
        ctx.beginPath();
        ctx.arc(cx, cy, r + 8, 0, Math.PI * 2);
        ctx.fill();

        // Rays (enhanced with gradient)
        ctx.strokeStyle = '#c8a000';
        ctx.lineWidth = 2.5;
        for (let i = 0; i < 8; i++) {
          const a = (i / 8) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
          ctx.lineTo(cx + Math.cos(a) * 21, cy + Math.sin(a) * 21);
          ctx.stroke();
        }

        // Head disk
        ctx.fillStyle = '#f9ca24';
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();

        // Head shading
        ctx.fillStyle = 'rgba(200,160,0,0.4)';
        ctx.beginPath();
        ctx.arc(cx + 3, cy + 2, r, 0, Math.PI * 2);
        ctx.fill();

        // Face details (eyes with depth)
        ctx.fillStyle = '#3a2a00';
        ctx.fillRect(34, 17, 5, 5);
        ctx.fillRect(42, 17, 5, 5);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(35, 18, 2, 2);
        ctx.fillRect(43, 18, 2, 2);

        // Mouth (smile)
        ctx.strokeStyle = '#3a2a00';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(40, 26, 3, 0, Math.PI);
        ctx.stroke();

        // Body robe
        ctx.fillStyle = '#e8b800';
        ctx.fillRect(18, 35, 44, 35);

        // Robe shadow
        ctx.fillStyle = '#9a7000';
        ctx.fillRect(18, 56, 44, 14);

        // Collar/Breastplate
        ctx.fillStyle = '#ffd700';
        ctx.fillRect(26, 35, 28, 10);
        ctx.fillStyle = '#c8a000';
        ctx.fillRect(28, 36, 24, 3);

        // Staff prop
        ctx.strokeStyle = '#8b6f47';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(60, 36);
        ctx.lineTo(70, 15);
        ctx.stroke();

        // Staff orb
        ctx.fillStyle = '#f9ca24';
        ctx.beginPath();
        ctx.arc(70, 13, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#c8a000';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Arms
        ctx.fillStyle = '#e8b800';
        ctx.fillRect(6, 37, 14, 12);
        ctx.fillRect(60, 37, 14, 12);

      } else if (guide === 'weaver') {
        // Enhanced purple-robed weaver
        ctx.fillStyle = '#7050b0';
        ctx.globalAlpha = 0.9;
        ctx.beginPath();
        ctx.moveTo(13, 16);
        ctx.lineTo(67, 16);
        ctx.lineTo(62, 72);
        ctx.lineTo(18, 72);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;

        // Robe shading gradient
        ctx.fillStyle = '#3a2060';
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.moveTo(40, 16);
        ctx.lineTo(67, 16);
        ctx.lineTo(62, 72);
        ctx.lineTo(40, 72);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;

        // Hood top (enhanced)
        ctx.fillStyle = '#9070d0';
        ctx.beginPath();
        ctx.arc(40, 16, 15, Math.PI, 0);
        ctx.fill();

        // Face glow
        ctx.fillStyle = '#c8aaff';
        ctx.globalAlpha = 0.4;
        ctx.fillRect(30, 16, 20, 12);
        ctx.globalAlpha = 1;

        // Eyes with glow
        ctx.fillStyle = '#e0d0ff';
        ctx.fillRect(32, 18, 5, 4);
        ctx.fillRect(43, 18, 5, 4);

        // Loom threads (vertical warp)
        ctx.strokeStyle = '#a0c8ff';
        ctx.lineWidth = 1.5;
        for (let i = 0; i < 7; i++) {
          ctx.beginPath();
          ctx.moveTo(14 + i * 8, 24);
          ctx.lineTo(15 + i * 8, 68);
          ctx.stroke();
        }

        // Horizontal weaving (weft)
        ctx.strokeStyle = '#8aa8ff';
        ctx.lineWidth = 0.8;
        ctx.globalAlpha = 0.6;
        for (let i = 0; i < 5; i++) {
          ctx.beginPath();
          ctx.moveTo(14, 32 + i * 9);
          ctx.lineTo(66, 32 + i * 9);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;

        // Arms with hands
        ctx.fillStyle = '#7050b0';
        ctx.fillRect(5, 40, 10, 14);
        ctx.fillRect(65, 40, 10, 14);

        // Hands (at loom)
        ctx.fillStyle = '#c8aaff';
        ctx.fillRect(6, 52, 8, 4);
        ctx.fillRect(66, 52, 8, 4);

      } else {
        // Enhanced psychic with star crown and third eye
        const sx = 40, sy = 12, outerR = 14, innerR = 8;

        // Star crown
        ctx.fillStyle = '#ff88cc';
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
          const r = i % 2 === 0 ? outerR : innerR;
          const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
          const x = sx + Math.cos(a) * r;
          const y = sy + Math.sin(a) * r;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();

        // Star glow
        ctx.strokeStyle = '#ffaadd';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Star shimmer (outer glow)
        ctx.strokeStyle = 'rgba(255,170,221,0.3)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 10; i++) {
          const r = (i % 2 === 0 ? outerR : innerR) + 3;
          const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
          const x = sx + Math.cos(a) * r;
          const y = sy + Math.sin(a) * r;
          ctx.beginPath();
          ctx.arc(x, y, 1.5, 0, Math.PI * 2);
          ctx.stroke();
        }

        // Face (below crown)
        ctx.fillStyle = '#ff99dd';
        ctx.fillRect(33, 26, 14, 10);

        // Third eye (forehead)
        ctx.fillStyle = '#ff44bb';
        ctx.beginPath();
        ctx.arc(40, 22, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#ffaadd';
        ctx.lineWidth = 0.5;
        ctx.stroke();

        // Eyes
        ctx.fillStyle = '#2a0a1a';
        ctx.fillRect(35, 29, 3, 3);
        ctx.fillRect(42, 29, 3, 3);

        // Body robe
        ctx.fillStyle = '#e060a0';
        ctx.fillRect(16, 40, 48, 32);

        // Body shading
        ctx.fillStyle = '#b04080';
        ctx.fillRect(40, 40, 24, 32);

        // Collar gem
        ctx.fillStyle = '#ff44bb';
        ctx.fillRect(33, 40, 14, 7);
        ctx.strokeStyle = '#ffaadd';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Meditation hands (center)
        ctx.fillStyle = '#ff99dd';
        ctx.beginPath();
        ctx.arc(40, 58, 5, 0, Math.PI * 2);
        ctx.fill();

        // Arms flowing down
        ctx.fillStyle = '#e060a0';
        ctx.fillRect(5, 42, 12, 12);
        ctx.fillRect(63, 42, 12, 12);

        // Hand glow
        ctx.fillStyle = 'rgba(255,170,221,0.3)';
        ctx.beginPath();
        ctx.arc(40, 58, 7, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function updateCardDisplay(card) {
      const container = document.getElementById('card-image-container');
      container.innerHTML = '';

      // Use celestial SVG cards for Minor Arcana
      if (card.suit) {
        const lightOrShadow = gameState.lightOrShadow[card.id] || 'light';
        const cardElement = CardGenerator.generateMinorCard(card.suit, card.rank, lightOrShadow);
        container.appendChild(cardElement);
      } else {
        // Major Arcana: generate celestial-themed card
        container.appendChild(generateMajorArcanaCard(card));
      }

      // Metadata display (below card, not overlaid)
      document.getElementById('card-name').textContent = card.name;
      document.getElementById('card-keywords').textContent = card.keywords.join(' · ');
    }

    function generateMajorArcanaCard(card) {
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('width', '110');
      svg.setAttribute('height', '160');
      svg.setAttribute('viewBox', '0 0 110 160');

      // Gradient background (purple to deep blue)
      const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
      const grad = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
      grad.setAttribute('id', 'majorGrad');
      grad.setAttribute('x1', '0%');
      grad.setAttribute('y1', '0%');
      grad.setAttribute('x2', '100%');
      grad.setAttribute('y2', '100%');
      const stop1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
      stop1.setAttribute('offset', '0%');
      stop1.setAttribute('stop-color', '#2a0845');
      const stop2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
      stop2.setAttribute('offset', '100%');
      stop2.setAttribute('stop-color', '#0f1a3a');
      grad.appendChild(stop1);
      grad.appendChild(stop2);
      defs.appendChild(grad);
      svg.appendChild(defs);

      // Background
      const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      bg.setAttribute('width', '110');
      bg.setAttribute('height', '160');
      bg.setAttribute('fill', 'url(#majorGrad)');
      svg.appendChild(bg);

      // Border
      const border = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      border.setAttribute('width', '110');
      border.setAttribute('height', '160');
      border.setAttribute('fill', 'none');
      border.setAttribute('stroke', '#e056fd');
      border.setAttribute('stroke-width', '2');
      svg.appendChild(border);

      // Central symbol - cosmic eye or star for major arcana
      const symbol = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      symbol.setAttribute('cx', '55');
      symbol.setAttribute('cy', '90');
      symbol.setAttribute('r', '20');
      symbol.setAttribute('fill', 'none');
      symbol.setAttribute('stroke', '#f9ca24');
      symbol.setAttribute('stroke-width', '1.5');
      svg.appendChild(symbol);

      const inner = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      inner.setAttribute('cx', '55');
      inner.setAttribute('cy', '90');
      inner.setAttribute('r', '8');
      inner.setAttribute('fill', '#e056fd');
      svg.appendChild(inner);

      // Roman numeral
      const numeral = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      numeral.setAttribute('x', '8');
      numeral.setAttribute('y', '16');
      numeral.setAttribute('font-size', '8');
      numeral.setAttribute('fill', '#f9ca24');
      numeral.setAttribute('font-weight', 'bold');
      numeral.textContent = card.id.toString();
      svg.appendChild(numeral);

      // Card name
      const name = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      name.setAttribute('x', '55');
      name.setAttribute('y', '153');
      name.setAttribute('text-anchor', 'middle');
      name.setAttribute('font-size', '6');
      name.setAttribute('fill', '#c8d4e8');
      name.textContent = 'MAJOR';
      svg.appendChild(name);

      const container = document.createElement('div');
      container.className = 'generated-card';
      container.style.width = '110px';
      container.style.height = '160px';
      container.appendChild(svg);

      return container;
    }

    // ==================== ORRERY ====================
    let orreryAnimFrame = null;
    let orreryPlanetPositions = {};

    const ORRERY_PLANETS = [
      { name: 'Moon',    key: 'moon',    r: 38,  color: '#dfe6e9' },
      { name: 'Mercury', key: 'mercury', r: 62,  color: '#fdcb6e' },
      { name: 'Venus',   key: 'venus',   r: 84,  color: '#fd79a8' },
      { name: 'Mars',    key: 'mars',    r: 108, color: '#e17055' },
      { name: 'Jupiter', key: 'jupiter', r: 132, color: '#a29bfe' },
      { name: 'Saturn',  key: 'saturn',  r: 156, color: '#636e72' },
    ];

    function drawOrreryFrame() {
      const canvas = document.getElementById('orrery-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const w = canvas.width, h = canvas.height;
      const cx = w / 2, cy = h / 2;

      ctx.fillStyle = '#0a0015';
      ctx.fillRect(0, 0, w, h);

      // Stars
      ctx.fillStyle = 'rgba(223,230,233,0.7)';
      for (let i = 0; i < 80; i++) {
        const sx = (Math.sin(i * 137.5) * 0.5 + 0.5) * w;
        const sy = (Math.cos(i * 97.3)  * 0.5 + 0.5) * h;
        const ss = (Math.sin(i * 53.1)  * 0.5 + 0.5) * 1.2;
        ctx.fillRect(sx, sy, ss, ss);
      }

      const now = Date.now() / 12000;
      orreryPlanetPositions = {};

      // Orbits
      ORRERY_PLANETS.forEach((p) => {
        ctx.strokeStyle = 'rgba(140,140,180,0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(cx, cy, p.r, 0, Math.PI * 2);
        ctx.stroke();
      });

      // Planets
      ORRERY_PLANETS.forEach((p, idx) => {
        const angle = now * (0.5 + idx * 0.08) + (idx / ORRERY_PLANETS.length) * Math.PI * 2;
        const px = cx + Math.cos(angle) * p.r;
        const py = cy + Math.sin(angle) * p.r;
        orreryPlanetPositions[p.key] = { x: px, y: py, name: p.name };

        // Enhanced outer glow (larger, more visible)
        const outerGrad = ctx.createRadialGradient(px, py, 0, px, py, 16);
        outerGrad.addColorStop(0, p.color);
        outerGrad.addColorStop(0.5, p.color + '80');
        outerGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = outerGrad;
        ctx.beginPath();
        ctx.arc(px, py, 16, 0, Math.PI * 2);
        ctx.fill();

        // Inner glow
        const innerGrad = ctx.createRadialGradient(px, py, 0, px, py, 8);
        innerGrad.addColorStop(0, p.color);
        innerGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = innerGrad;
        ctx.beginPath();
        ctx.arc(px, py, 8, 0, Math.PI * 2);
        ctx.fill();

        // Planet body (slightly larger)
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(px, py, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Orbital ring accent
        ctx.strokeStyle = 'rgba(' + p.color.slice(1).match(/.{2}/g).map(x => parseInt(x, 16)).join(',') + ', 0.3)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.arc(px, py, 10, 0, Math.PI * 2);
        ctx.stroke();

        // Label (clearer visibility)
        ctx.fillStyle = p.color;
        ctx.font = 'bold 5px "Press Start 2P"';
        ctx.textAlign = 'center';
        ctx.fillText(p.name, px, py + 16);

        // Cards on this planet (enhanced highlight)
        const cardsHere = gameState.drawnCards.filter(c => c.orreryPlanet === p.key);
        if (cardsHere.length > 0) {
          ctx.shadowColor = '#f9ca24';
          ctx.shadowBlur = 10;
          ctx.strokeStyle = 'rgba(249,202,36,0.95)';
          ctx.lineWidth = 1.5;
          ctx.strokeRect(px - 9, py - 12, 18, 24);
          ctx.shadowBlur = 0;
        }
      });

      // Sun (enhanced)
      orreryPlanetPositions['sun'] = { x: cx, y: cy, name: 'Sun' };

      // Sun rays
      ctx.strokeStyle = 'rgba(249,202,36,0.4)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * 12, cy + Math.sin(a) * 12);
        ctx.lineTo(cx + Math.cos(a) * 20, cy + Math.sin(a) * 20);
        ctx.stroke();
      }

      // Sun outer glow
      const sunGlowOuter = ctx.createRadialGradient(cx, cy, 0, cx, cy, 18);
      sunGlowOuter.addColorStop(0, 'rgba(249,202,36,0.6)');
      sunGlowOuter.addColorStop(1, 'transparent');
      ctx.fillStyle = sunGlowOuter;
      ctx.beginPath();
      ctx.arc(cx, cy, 18, 0, Math.PI * 2);
      ctx.fill();

      // Sun body
      ctx.fillStyle = '#f9ca24';
      ctx.shadowColor = '#f9ca24';
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.arc(cx, cy, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.font = 'bold 5px "Press Start 2P"';
      ctx.fillStyle = '#c8a000';
      ctx.textAlign = 'center';
      ctx.fillText('Sun', cx, cy + 22);

      if (document.getElementById('orrery-zone').classList.contains('visible')) {
        orreryAnimFrame = requestAnimationFrame(drawOrreryFrame);
      }
    }

    function showOrrery() {
      document.getElementById('orrery-zone').classList.add('visible');
      drawOrreryFrame();
      const canvas = document.getElementById('orrery-canvas');
      canvas.addEventListener('click', handleOrreryClick);
      canvas.addEventListener('touchstart', handleOrreryTouch, { passive: false });
    }

    function hideOrrery() {
      document.getElementById('orrery-zone').classList.remove('visible');
      if (orreryAnimFrame) { cancelAnimationFrame(orreryAnimFrame); orreryAnimFrame = null; }
      const canvas = document.getElementById('orrery-canvas');
      canvas.removeEventListener('click', handleOrreryClick);
      canvas.removeEventListener('touchstart', handleOrreryTouch);
    }

    function handleOrreryClick(e) {
      const canvas = document.getElementById('orrery-canvas');
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width  / rect.width;
      const scaleY = canvas.height / rect.height;
      checkOrreryHit((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
    }

    function handleOrreryTouch(e) {
      e.preventDefault();
      const canvas = document.getElementById('orrery-canvas');
      const rect = canvas.getBoundingClientRect();
      const t = e.touches[0];
      const scaleX = canvas.width  / rect.width;
      const scaleY = canvas.height / rect.height;
      checkOrreryHit((t.clientX - rect.left) * scaleX, (t.clientY - rect.top) * scaleY);
    }

    function checkOrreryHit(x, y) {
      for (const [key, pos] of Object.entries(orreryPlanetPositions)) {
        const dx = x - pos.x, dy = y - pos.y;
        const hitRadius = 30; // Increased from 22 for better touch/click targets
        if (Math.sqrt(dx*dx + dy*dy) < hitRadius) {
          const lore = PLANET_LORE[key];
          if (lore) {
            typeText(pos.name.toUpperCase() + '\n' + lore);
            const el = document.getElementById('dialogue-options');
            el.innerHTML = '';
            el.className = 'dialogue-options';
            const backBtn = document.createElement('button');
            backBtn.className = 'option-btn';
            backBtn.textContent = '← BACK TO ORRERY';
            backBtn.onclick = () => {
              typeText('Touch a planet to learn its celestial influence.');
              showOrreryReturnBtn();
            };
            const returnBtn = document.createElement('button');
            returnBtn.className = 'option-btn';
            returnBtn.textContent = '← RETURN TO READING';
            returnBtn.onclick = () => { if (_orreryResolve) _orreryResolve(); };
            el.appendChild(backBtn);
            el.appendChild(returnBtn);
          }
          break;
        }
      }
    }

    // ==================== PLANET PALETTE ====================
    function setPlanetPalette(planet) {
      const palettes = {
        moon:    { space: '#1a2f4a', neon: '#74b9ff' },
        venus:   { space: '#1a0a2e', neon: '#ff7675' },
        mars:    { space: '#1a0a2e', neon: '#e17055' },
        saturn:  { space: '#1a0a2e', neon: '#636e72' },
        mercury: { space: '#1a0a2e', neon: '#fdcb6e' },
        jupiter: { space: '#1a0a2e', neon: '#a29bfe' },
        sun:     { space: '#1a0a2e', neon: '#f9ca24' },
      };
      const pal = palettes[planet] || palettes.moon;
      document.documentElement.style.setProperty('--bg-space', pal.space);
      document.documentElement.style.setProperty('--accent-neon', pal.neon);
    }

    // ==================== STARFIELD ====================
    function initStarfield() {
      const canvas = document.getElementById('starfield');
      const ctx = canvas.getContext('2d');
      const stars = [];
      for (let layer = 0; layer < 3; layer++) {
        const count = [80, 40, 15][layer];
        const size  = [0.8, 1.4, 2.2][layer];
        const speed = [0.06, 0.16, 0.32][layer];
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size, layer, speed,
            opacity: Math.random() * 0.5 + 0.4,
          });
        }
      }
      function animate() {
        const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--bg-space').trim() || '#0d0921';
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Render scene background if available
        if (typeof SceneSystem !== 'undefined') {
          SceneSystem.renderScene(canvas, ctx);
        }

        stars.forEach(s => {
          s.x -= s.speed;
          if (s.x < 0) s.x = canvas.width;
          if (s.layer === 1 && Math.random() > 0.94) s.opacity = Math.random() * 0.5 + 0.4;
          ctx.fillStyle = `rgba(200,212,232,${s.opacity})`;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.size / 2, 0, Math.PI * 2);
          ctx.fill();
        });
        requestAnimationFrame(animate);
      }
      animate();
    }

    // ==================== BACK BUTTON ====================
    document.getElementById('back-btn').addEventListener('click', () => {
      hideCardImage();
      hideNavBar();
      setState('INTENT_SELECT');
    });

  </script>
  <script src="./card-generator.js"></script>
  <script src="./tarot-final-readings.js"></script>
  <script src="./tarot/expression-system.js"></script>
  <script src="./tarot/dialogue.js"></script>
  <script src="./tarot/fortune-database.js"></script>
  <script>
    // ==================== INIT (after all scripts load) ====================
    function initGame() {
      initStarfield();

      gameState.activeGuide = 'psychic';
      drawCharacter(gameState.activeGuide);
      document.getElementById('character-container').classList.remove('hidden');

      // Initialize scene
      SceneSystem.setScene('cosmic-night', 0);
      ExpressionSystem.setExpression('neutral-welcome', 0);

      setState('GREET');
    }

    // Run after DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initGame);
    } else {
      initGame();
    }
  </script>
</body>
