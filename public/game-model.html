<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celestial Tarot — Zodiac Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #0a0015;
      --bg-space: #1a0a2e;
      --accent-gold: #f9ca24;
      --accent-neon: #e056fd;
      --accent-cyan: #00cec9;
      --silver: #dfe6e9;
      --dialogue-bg-top: #1e3799;
      --dialogue-bg-bot: #0c2461;
      --border: #dfe6e9;
    }

    body {
      background: var(--bg-deep);
      color: var(--silver);
      font-family: 'Press Start 2P', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .game-container {
      width: 333px;
      height: 600px;
      position: relative;
      background: var(--bg-deep);
      border-radius: 12px;
      border: 3px solid #e056fd;
      box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(233, 86, 253, 0.4);
      overflow: hidden;
    }

    /* CRT scanlines overlay */
    .game-container::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      background: repeating-linear-gradient(
        transparent 0px,
        transparent 2px,
        rgba(0, 0, 0, 0.18) 2px,
        rgba(0, 0, 0, 0.18) 4px
      );
      border-radius: 12px;
    }

    /* Scene zone: 0–400px */
    .scene-zone {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 400px;
      background: var(--bg-space);
      overflow: hidden;
    }

    #starfield {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .character-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    .character-container.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #character-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }

    .card-image-zone {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 5;
    }

    .card-image-zone.visible {
      opacity: 1;
    }

    .card-image {
      max-width: 180px;
      max-height: 280px;
      object-fit: contain;
      image-rendering: auto;
      border: 2px solid var(--accent-gold);
      border-radius: 2px;
    }

    .card-fallback {
      width: 120px;
      height: 180px;
      background: linear-gradient(135deg, #1a0a2e, #2d1b69);
      border: 2px solid var(--accent-gold);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 7px;
      color: var(--accent-gold);
      border-radius: 2px;
      padding: 8px;
    }

    .card-metadata {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 6;
    }

    .card-name {
      font-size: 11px;
      color: var(--accent-gold);
      font-weight: bold;
      margin-bottom: 4px;
    }

    .card-keywords {
      font-size: 7px;
      color: var(--accent-cyan);
      opacity: 0.8;
    }

    .card-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .card-grid.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .card-grid-container {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .card-thumbnail {
      width: 80px;
      height: 120px;
      background: linear-gradient(135deg, #2d1b69, #1a0a2e);
      border: 2px solid var(--accent-neon);
      border-radius: 2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6px;
      text-align: center;
      padding: 4px;
      color: var(--accent-neon);
      transition: all 0.2s ease;
      transform: scale(1);
    }

    .card-thumbnail:hover {
      border-color: var(--accent-gold);
      box-shadow: 0 0 12px rgba(249, 202, 36, 0.5);
      transform: scale(1.08);
    }

    /* Dialogue panel: 400–600px */
    .dialogue-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 200px;
      background: linear-gradient(180deg, var(--dialogue-bg-top), var(--dialogue-bg-bot));
      border-top: 3px solid var(--border);
      padding: 12px 14px 10px;
      display: flex;
      flex-direction: column;
      z-index: 20;
    }

    .dialogue-text {
      height: 110px;
      overflow: hidden;
      font-size: 9px;
      line-height: 1.8;
      color: var(--silver);
      margin-bottom: 6px;
      word-wrap: break-word;
    }

    .dialogue-options {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .dialogue-options::-webkit-scrollbar {
      display: none;
    }

    .option-btn {
      background: transparent;
      border: 2px solid var(--accent-neon);
      color: var(--accent-neon);
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      padding: 4px 6px;
      cursor: pointer;
      text-align: left;
      transition: all 0.1s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    .option-btn:hover {
      background: var(--accent-neon);
      color: var(--dialogue-bg-bot);
      box-shadow: 0 0 8px rgba(224, 86, 253, 0.6);
    }

    .option-btn:active {
      transform: scale(0.98);
    }

    .nav-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 28px;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 2px solid var(--accent-gold);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 8px;
      z-index: 25;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .nav-bar.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .back-btn, .sound-btn {
      background: transparent;
      border: 1px solid var(--accent-gold);
      color: var(--accent-gold);
      font-size: 10px;
      padding: 2px 6px;
      cursor: pointer;
      font-family: 'Press Start 2P', monospace;
      transition: all 0.1s ease;
    }

    .back-btn:hover, .sound-btn:hover {
      background: var(--accent-gold);
      color: var(--bg-deep);
    }

    /* Orrery canvas */
    #orrery-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }

    .orrery-zone {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 400px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .orrery-zone.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* Boot console */
    .boot-console {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000000;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: opacity 0.5s ease;
      pointer-events: all;
    }

    .boot-console.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .boot-text {
      font-size: 9px;
      color: var(--accent-gold);
      text-align: left;
      line-height: 2.2;
      width: 90%;
      height: 90%;
      overflow: hidden;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    /* Loading bar */
    .loading-bar {
      width: 100%;
      height: 8px;
      background: rgba(249, 202, 36, 0.2);
      border: 1px solid var(--accent-gold);
      margin: 8px 0;
      overflow: hidden;
    }

    .loading-fill {
      height: 100%;
      background: var(--accent-gold);
      width: 0%;
      transition: width 0.1s linear;
    }

    @keyframes palette-flash {
      0% { filter: brightness(1); }
      50% { filter: brightness(2); }
      100% { filter: brightness(1); }
    }

    .flash {
      animation: palette-flash 0.3s ease;
    }

    /* Utility */
    .hidden {
      display: none !important;
    }
  </style>
</head>

        const ranks = ['Ace', '2', '3', '4', '5', '6', '7', '8', '9', '10', 'Page', 'Knight', 'Queen', 'King'];
        const suit = suits[suitIndex];
        const rank = ranks[rankIndex];
        const suitDescriptions = {
          'Wands': 'A staff of fire descends from the clouds.',
          'Cups': 'A chalice overflows with golden water.',
          'Swords': 'Blades cross in the air, sharp and true.',
          'Pentacles': 'A golden coin spins in the light.'
        };
        acc[cardId] = `${rank} of ${suit}: ${suitDescriptions[suit]}`;
        return acc;
      }, {})
    };

    // Minor Arcana template
    function generateMinorArcana() {
      const SUITS = {
        wands: { name: 'Wands', element: 'Fire', keywords: ['creativity', 'action', 'passion'], orreryPlanet: 'mars' },
        cups: { name: 'Cups', element: 'Water', keywords: ['emotions', 'relationships', 'intuition'], orreryPlanet: 'moon' },
        swords: { name: 'Swords', element: 'Air', keywords: ['intellect', 'conflict', 'truth'], orreryPlanet: 'mercury' },
        pentacles: { name: 'Pentacles', element: 'Earth', keywords: ['material', 'career', 'prosperity'], orreryPlanet: 'saturn' },
      };

      const NUMBER_MEANINGS = {
        ace: { upright: 'New opportunity and potential awaits.', reversed: 'Missed chance, blocked energy.' },
        2: { upright: 'A decision or partnership. Balance two paths.', reversed: 'Indecision, imbalance.' },
        3: { upright: 'Collaboration and growth. Working together succeeds.', reversed: 'Delays, lack of teamwork.' },
        4: { upright: 'Stability and security. Solid foundation built.', reversed: 'Stagnation, possessiveness.' },
        5: { upright: 'Conflict and challenge. Growth through adversity.', reversed: 'Recovery from loss.' },
        6: { upright: 'Harmony and generosity. Give and receive.', reversed: 'Unequal exchange.' },
        7: { upright: 'Reflection and assessment. Reevaluate your path.', reversed: 'Confusion, dishonesty.' },
        8: { upright: 'Movement and progress. Stay focused.', reversed: 'Delays, frustration.' },
        9: { upright: 'Abundance and wish fulfillment achieved.', reversed: 'Disappointment.' },
        10: { upright: 'Completion and responsibility. Success carries weight.', reversed: 'Burden, inability to delegate.' },
      };

      const COURT_MEANINGS = {
        page: { upright: 'A messenger or new beginnings. Curiosity and learning.', reversed: 'Immaturity, lack of direction.' },
        knight: { upright: 'Action and pursuit. Charging forward. A quest begins.', reversed: 'Impulsiveness, recklessness.' },
        queen: { upright: 'Nurturing mastery. Compassion, empathy, inner strength.', reversed: 'Insecurity, emotional manipulation.' },
        king: { upright: 'Mastery and authority. Leadership and vision.', reversed: 'Domination, tyranny.' },
      };

      const cards = [];
      const ranks = ['ace', '2', '3', '4', '5', '6', '7', '8', '9', '10', 'page', 'knight', 'queen', 'king'];

      for (const [suitKey, suit] of Object.entries(SUITS)) {
        for (const rank of ranks) {
          const isCourt = ['page', 'knight', 'queen', 'king'].includes(rank);
          const meanings = isCourt ? COURT_MEANINGS[rank] : (rank === 'ace' ? NUMBER_MEANINGS.ace : NUMBER_MEANINGS[rank]);

          const displayName = rank === 'ace'
            ? `Ace of ${suit.name}`
            : `${rank.charAt(0).toUpperCase() + rank.slice(1)} of ${suit.name}`;

          cards.push({
            id: 22 + cards.length,
            name: displayName,
            suit: suitKey,
            rank: rank,
            element: suit.element,
            keywords: suit.keywords,
            upright: meanings.upright,
            reversed: meanings.reversed,
            orreryPlanet: suit.orreryPlanet,
          });
        }
      }
      return cards;
    }

    const ALL_CARDS = [...MAJOR_ARCANA, ...generateMinorArcana()];

      hideCardGrid();
      showCardImage();
      const card = gameState.drawnCards[gameState.currentCardIndex];
      updateCardDisplay(card);
      showNavBar();

      await typeText("The card has been drawn.\nHow shall its force move through you?", 25);

      gameState.lightOrShadow[card.id] = await showOptions([

    async function stateInterpret() {
      const card = gameState.drawnCards[gameState.currentCardIndex];
      const isLight = gameState.lightOrShadow[card.id] === 'light';
      const interpretation = isLight ? card.upright : card.reversed;

      await typeText(interpretation, 20);

      const deepDiveOptions = [{ label: 'NEXT CARD', value: 'next' }];
      if (card.id < 22) { // Major Arcana
        deepDiveOptions.unshift({ label: 'ALCHEMICAL KEY', value: 'alchemical' });
        deepDiveOptions.unshift({ label: 'CELESTIAL PATH', value: 'celestial' });
      }
      if (gameState.currentCardIndex < gameState.drawnCards.length - 1) {
        deepDiveOptions.push({ label: 'VIEW THE ORRERY', value: 'orrery' });
      } else {
        deepDiveOptions[deepDiveOptions.length - 1].label = 'FINISH';
      }

      const choice = await showOptions(deepDiveOptions);

      if (choice === 'next') {
        gameState.currentCardIndex++;
        if (gameState.currentCardIndex < gameState.drawnCards.length) {
          await setState('REVEAL');
        } else {
          await setState('END');
        }
      } else if (choice === 'orrery') {
        await setState('ORRERY');
      } else {
        await setState('DEEP_DIVE');
      }
    }

      const card = gameState.drawnCards[gameState.currentCardIndex];

      const choice = await (async () => {

        await typeText(`The ${card.name} carries deep meaning...`, 25);

      if (choice === 'next') {
        gameState.currentCardIndex++;
        if (gameState.currentCardIndex < gameState.drawnCards.length) {
          await setState('REVEAL');

          await setState('END');

    // ==================== DECK ENGINE ====================
    class TarotDeck {
      constructor(options = {}) {
        this.allowReversed = options.allowReversed !== false;
        this.rng = mulberry32(options.seed ?? Date.now());
      }

      shuffle() {
        const arr = [...ALL_CARDS];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(this.rng() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      draw(count = 1) {
        const shuffled = this.shuffle();
        return shuffled.slice(0, count).map(cardData => ({
          ...cardData,
          preReveal: PRE_REVEAL_DESCRIPTIONS[cardData.id] || `The ${cardData.name} appears.`
        }));
      }
    }

    function mulberry32(seed) {
      return function () {
        seed |= 0;
        seed = (seed + 0x6d2b79f5) | 0;
        let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function bootSequenceQuick() {
      const bootEl = document.getElementById('boot-text');
      let bootText = '';
      let progress = 0;

      const bootInterval = setInterval(() => {
        if (progress === 0) {
          bootText = '> SATURN TERMINAL v.XVI\n';
        } else if (progress === 1) {
          bootText += '> INITIATING STAR ALIGNMENT...\n';
        } else if (progress >= 2 && progress <= 8) {
          const pct = (progress - 2) * 14;
          bootText = bootText.split('\n').slice(0, 2).join('\n') + '\n[' + '█'.repeat(Math.floor(pct / 10)) + '░'.repeat(10 - Math.floor(pct / 10)) + '] ' + pct + '%\n';
        } else if (progress === 9) {
          bootText += '> STAR ALIGNMENT COMPLETE\n> CELESTIAL GUIDES: ONLINE\n> READY\n';
        } else if (progress === 10) {
          document.querySelector('.game-container').classList.add('flash');
        } else if (progress === 11) {
          document.querySelector('.game-container').classList.remove('flash');
          clearInterval(bootInterval);
          return;
        }

        bootEl.textContent = bootText;
        progress++;
      }, 150);
    }

    function drawCharacter(guide) {
      const canvas = document.getElementById('character-canvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, 48, 64);

      const sprites = {
        scribe: () => {
          ctx.fillStyle = '#f9ca24';
          // Body
          ctx.fillRect(12, 20, 24, 20);
          // Head (sun disk)
          ctx.beginPath();
          ctx.arc(24, 12, 8, 0, Math.PI * 2);
          ctx.fill();
          // Rays
          for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const x1 = 24 + Math.cos(angle) * 8;
            const y1 = 12 + Math.sin(angle) * 8;
            const x2 = 24 + Math.cos(angle) * 12;
            const y2 = 12 + Math.sin(angle) * 12;
            ctx.strokeStyle = '#f9ca24';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
          }
        },
        weaver: () => {
          ctx.fillStyle = '#a29bfe';
          ctx.globalAlpha = 0.7;
          // Hooded robe
          ctx.beginPath();
          ctx.moveTo(8, 10);
          ctx.lineTo(40, 10);
          ctx.lineTo(36, 40);
          ctx.lineTo(12, 40);
          ctx.closePath();
          ctx.fill();
          ctx.globalAlpha = 1;
          // Threads
          ctx.strokeStyle = '#74b9ff';
          ctx.lineWidth = 1;
          for (let i = 0; i < 4; i++) {
            ctx.beginPath();
            ctx.moveTo(12 + i * 7, 12);
            ctx.lineTo(12 + i * 7, 35);
            ctx.stroke();
          }
        },
        psychic: () => {
          ctx.fillStyle = '#fd79a8';
          // Body
          ctx.fillRect(10, 24, 28, 18);
          // Crown (5-point star)
          const starX = 24, starY = 8;
          const points = 5;
          const outerR = 8, innerR = 4;
          ctx.beginPath();
          for (let i = 0; i < points * 2; i++) {
            const r = i % 2 === 0 ? outerR : innerR;
            const angle = (i * Math.PI) / points - Math.PI / 2;
            const x = starX + Math.cos(angle) * r;
            const y = starY + Math.sin(angle) * r;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.fill();
        },
      };

      if (sprites[guide]) {
        sprites[guide]();
      }
    }

    function drawOrrery() {
      const canvas = document.getElementById('orrery-canvas');
      const ctx = canvas.getContext('2d');
      const w = canvas.width, h = canvas.height;
      const cx = w / 2, cy = h / 2;

      ctx.fillStyle = '#0a0015';
      ctx.fillRect(0, 0, w, h);

      // Starfield
      ctx.fillStyle = '#dfe6e9';
      for (let i = 0; i < 100; i++) {
        const x = Math.random() * w;
        const y = Math.random() * h;
        const s = Math.random() * 0.8;
        ctx.fillRect(x, y, s, s);
      }

      // Planets
      const planets = [
        { name: 'Moon', r: 45, color: '#dfe6e9' },
        { name: 'Mercury', r: 75, color: '#fdcb6e' },
        { name: 'Venus', r: 100, color: '#fd79a8' },
        { name: 'Mars', r: 128, color: '#e17055' },
        { name: 'Jupiter', r: 158, color: '#a29bfe' },
        { name: 'Saturn', r: 185, color: '#636e72' },
      ];

      const now = Date.now() / 10000;
      planets.forEach((p, idx) => {
        const angle = now + (idx / planets.length) * Math.PI * 2;
        const x = cx + Math.cos(angle) * p.r;
        const y = cy + Math.sin(angle) * p.r;

        // Planet
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(x, y, 6, 0, Math.PI * 2);
        ctx.fill();

        // Label
        ctx.fillStyle = p.color;
        ctx.font = '7px "Press Start 2P"';
        ctx.textAlign = 'center';
        ctx.fillText(p.name, x, y + 16);
      });

      // Sun
      ctx.fillStyle = '#f9ca24';
      ctx.beginPath();
      ctx.arc(cx, cy, 8, 0, Math.PI * 2);
      ctx.fill();

      // Cards on planets
      const planetMap = {};
      planets.forEach(p => planetMap[p.name.toLowerCase()] = p);

      gameState.drawnCards.forEach((card, idx) => {
        const planetKey = card.orreryPlanet;
        const planet = planets.find(p => p.name.toLowerCase() === planetKey);
        if (!planet) return;

        const angle = now + (planets.indexOf(planet) / planets.length) * Math.PI * 2;
        const x = cx + Math.cos(angle) * planet.r;
        const y = cy + Math.sin(angle) * planet.r;

        // Card thumbnail (small rectangle with glow)
        ctx.shadowColor = '#f9ca24';
        ctx.shadowBlur = 8;
        ctx.fillStyle = 'rgba(249, 202, 36, 0.3)';
        ctx.fillRect(x - 8, y - 12, 16, 24);
        ctx.shadowBlur = 0;
      });
    }

    function setPlanetPalette(planet) {
      const palettes = {
        moon: { space: '#1a2f4a', neon: '#74b9ff' },
        venus: { space: '#1a0a2e', neon: '#ff7675' },
        mars: { space: '#1a0a2e', neon: '#e17055' },

    // ==================== AUDIO ====================
    function initAudio() {
      if (audioState.ctx) return;
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      audioState.ctx = new AudioCtx();
      startBackgroundMusic();
    }

    function playSound(type) {
      if (gameState.isMuted || !audioState.ctx) return;
      const ctx = audioState.ctx;

      if (type === 'select') {
        fmTone(523, 1.5, 50, 0.12, 0.08);
        setTimeout(() => fmTone(659, 1.5, 50, 0.12, 0.08), 140);
      } else if (type === 'reveal') {
        fmTone(440, 2, 80, 0.6, 0.1);
        setTimeout(() => fmTone(554, 2, 80, 0.6, 0.1), 150);
        setTimeout(() => fmTone(659, 2, 80, 0.6, 0.1), 300);
      }
    }

    function fmTone(freq, modRatio, modDepth, duration, gain = 0.1) {
      if (gameState.isMuted || !audioState.ctx) return;
      const ctx = audioState.ctx;

      const carrier = ctx.createOscillator();
      const mod = ctx.createOscillator();
      const modGain = ctx.createGain();
      const ampGain = ctx.createGain();

      mod.frequency.value = freq * modRatio;
      modGain.gain.value = modDepth;
      mod.connect(modGain);
      modGain.connect(carrier.frequency);

      carrier.type = 'sine';
      carrier.connect(ampGain);
      ampGain.connect(ctx.destination);

      ampGain.gain.setValueAtTime(gain, ctx.currentTime);
      ampGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

      carrier.start(ctx.currentTime);
      mod.start(ctx.currentTime);
      carrier.stop(ctx.currentTime + duration);
      mod.stop(ctx.currentTime + duration);
    }

    function startBackgroundMusic() {
      if (gameState.isMuted || !audioState.ctx) return;
      const ctx = audioState.ctx;

      const bass = ctx.createOscillator();
      const bassGain = ctx.createGain();
      bass.frequency.value = 55; // A1
      bass.type = 'square';
      bass.connect(bassGain);
      bassGain.gain.value = 0.02;
      bassGain.connect(ctx.destination);
      bass.start();
      audioState.backgroundOscillators.push(bass);
      audioState.backgroundGains.push(bassGain);
    }

    document.getElementById('sound-btn').addEventListener('click', () => {
      gameState.isMuted = !gameState.isMuted;
      document.getElementById('sound-btn').textContent = gameState.isMuted ? '♫' : '♪';
    });

    document.getElementById('back-btn').addEventListener('click', () => {
      setState('SPREAD_GRID');
    });

    // ==================== STARFIELD ====================
    function initStarfield() {
      const canvas = document.getElementById('starfield');
      const ctx = canvas.getContext('2d');
      const stars = [];

      // Create star layers
      for (let layer = 0; layer < 3; layer++) {
        const layerStars = layer === 0 ? 80 : layer === 1 ? 40 : 15;
        const sizes = layer === 0 ? 1 : layer === 1 ? 1.5 : 2.5;
        for (let i = 0; i < layerStars; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: sizes,
            layer: layer,
            speed: [0.05, 0.15, 0.3][layer],
            opacity: Math.random() * 0.5 + 0.5,
          });
        }
      }

      function animate() {
        ctx.fillStyle = '#0a0015';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        stars.forEach(star => {
          star.x -= star.speed;
          if (star.x < 0) star.x = canvas.width;

          ctx.fillStyle = `rgba(223, 230, 233, ${star.opacity})`;
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.size / 2, 0, Math.PI * 2);
          ctx.fill();

          if (star.layer === 1 && Math.random() > 0.9) {
            star.opacity = Math.random() * 0.5 + 0.5;
          }
        });

        requestAnimationFrame(animate);
      }

      animate();
    }

    // ==================== INIT ====================
    document.addEventListener('click', initAudio, { once: true });
    document.addEventListener('touchstart', initAudio, { once: true });

    initStarfield();

    // Skip boot sequence and set up GREET state directly
    document.getElementById('boot-console').classList.add('hidden');

    // Set initial state
    gameState.activeGuide = getActiveGuide();
    gameState.currentState = 'GREET';

    // Draw character
    drawCharacter(gameState.activeGuide);

    // Show character container
    const charContainer = document.getElementById('character-container');
    if (charContainer) {
      charContainer.classList.remove('hidden');
    }

    // Set greeting dialogue
    const greetings = {
      scribe: "Seeker. The sun has noted your arrival. What brings you to the Zodiac Terminal?",
      weaver: "The night speaks softly. You have found your way to the threads. Welcome.",
      psychic: "Seeker. You have entered the Zodiac Terminal. The stars have noted your arrival.",
    };

    document.getElementById('dialogue-text').textContent = greetings[gameState.activeGuide];

    // Set up BEGIN button
    const optionsEl = document.getElementById('dialogue-options');
    optionsEl.innerHTML = '';
    const beginBtn = document.createElement('button');
    beginBtn.className = 'option-btn';
    beginBtn.textContent = 'BEGIN';
    beginBtn.onclick = async () => {
      playSound('select');
      await setState('INTENT');
    };
    optionsEl.appendChild(beginBtn);
  </script>
</body>
</html>
